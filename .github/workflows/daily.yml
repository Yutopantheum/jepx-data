name: fetch-jepx-daily
 
on:
  schedule:
    - cron: "0 12 * * *"      # 毎日 12:00 UTC = 21:00 JST に自動実行
  workflow_dispatch:           # 「Run workflow」手動ボタンも付ける
 
permissions:
  contents: write              # data.json を書き戻すために必要
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Fetch JEPX
        run: python fetch_jepx.py
 
      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update data.json [skip ci]"
          git push
 
